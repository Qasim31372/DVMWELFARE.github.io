<!DOCTYPE html>
<html>
<head>
  <title>Farmer Panel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h2>Farmer Dashboard</h2>
  <form action="backend/add_request.php" method="POST" enctype="multipart/form-data">
    <textarea name="request" placeholder="Enter your request" required></textarea><br>
    <input type="file" name="animal_pic" accept="image/*"><br>
    <button type="submit">Submit Request</button>
  </form>

  <h3>Track My Requests</h3>
  <iframe src="backend/fetch_data.php?role=farmer" width="100%" height="200"></iframe>

  <h3>Send Voice Note</h3>
  <button id="record">🎙 Start Recording</button>
  <button id="stop" disabled>⏹ Stop</button>
  <form action="backend/upload_voice.php" method="POST" enctype="multipart/form-data">
    <input type="file" id="voiceFile" name="voiceFile" hidden>
    <input type="hidden" name="role" value="farmer">
    <button type="submit">Upload Voice Note</button>
  </form>
<script>
let mediaRecorder, audioChunks = [];
document.getElementById("record").onclick = async () => {
  let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.start();
  audioChunks = [];
  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
  document.getElementById("stop").disabled = false;
};
document.getElementById("stop").onclick = () => {
  mediaRecorder.stop();
  mediaRecorder.onstop = () => {
    let blob = new Blob(audioChunks, { type: 'audio/wav' });
    let file = new File([blob], "note.wav");
    let dataTransfer = new DataTransfer();
    dataTransfer.items.add(file);
    document.getElementById("voiceFile").files = dataTransfer.files;
  };
};
</script>
</body>
</html>
