<!DOCTYPE html>
<html>
<head>
  <title>Welfare Website</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg p-4 animate__animated animate__fadeInDown" style="width: 22rem;">
    <h3 class="text-center">Login</h3>
    <form action="backend/login.php" method="POST">
      <input type="email" class="form-control my-2" name="email" placeholder="Email" required>
      <input type="password" class="form-control my-2" name="password" placeholder="Password" required>
      <select name="role" class="form-control my-2">
        <option value="farmer">Farmer</option>
        <option value="donor">Donor</option>
        <option value="admin">Admin</option>
      </select>
      <button class="btn btn-primary w-100">Login</button>
    </form>
    <div class="text-center mt-2">
      <a href="signup.html">Create Account</a>
    </div>
  </div>
</div>
</body>
</html>
