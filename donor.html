<!DOCTYPE html>
<html>
<head>
  <title>Donor Panel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h2>Donor Dashboard</h2>
  <form action="backend/add_donation.php" method="POST" enctype="multipart/form-data">
    <input type="number" step="0.01" name="amount" placeholder="Donation Amount" required><br>
    <textarea name="details" placeholder="Donation Details"></textarea><br>
    <select name="payment_method" required>
      <option value="JazzCash">JazzCash</option>
      <option value="Easypaisa">Easypaisa</option>
      <option value="Bank Account">Bank Account</option>
    </select><br>
    <input type="file" name="receipt" accept="image/*"><br>
    <button type="submit">Donate</button>
  </form>
  <h3>Donation Reports</h3>
  <iframe src="backend/fetch_data.php?role=donor" width="100%" height="200"></iframe>
</body>
</html>
